name: tests

# Laeuft die Headless-Testsuite (reine Logik, kein GUI/Spiel noetig) bei jedem
# Push und Pull-Request. Windows-Runner, weil einige Module pywin32/CustomTkinter
# importieren.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.13 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Abhaengigkeiten installieren
        run: |
          pip install --prefer-binary -r requirements.txt
          pip install --prefer-binary pytest

      - name: Tests
        # pytest statt 'unittest discover': Teile der Suite (z.B. seher) sind
        # pytest-nativ (Fixtures/parametrize) und laufen NICHT unter unittest
        # (-> seit 06-10 ImportError 'No module named pytest' = CI chronisch rot).
        # pytest fuehrt unittest.TestCase UND pytest-Tests aus -> exakt das, was
        # lokal gruen ist, plus die GUI-Tests (customtkinter via requirements;
        # Windows-Runner hat Desktop -> test_gui_smoke laeuft real und faengt
        # App-Start-/Rail-Regressionen wie den v1.2.6-KeyError).
        run: python -m pytest tests -q
