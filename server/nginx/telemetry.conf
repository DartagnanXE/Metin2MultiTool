# NEW nginx server-block for the telemetry subdomain.
# ADD THIS AS A NEW FILE (e.g. /etc/nginx/sites-available/ranking.example.tld);
# do NOT touch the existing kilab proxy config.
#
# Provides: TLS (certbot paths), STRICT per-IP + per-HWID rate-limiting, a small
# body-size cap, proxy_pass to the loopback-bound container, security headers,
# and fail2ban-friendly access logging.

# -- Trust the REAL client IP (anti-spoof) --------------------------------------
# nginx APPENDS the true peer to any client-sent X-Forwarded-For, so the
# left-most XFF value is attacker-controlled. These directives make $remote_addr
# (and the X-Real-IP we forward) the genuine edge IP regardless of what the
# client sent, so the per-IP rate-limit + the app's stored ip_hash stay honest.
# Replace the example range with YOUR actual upstream/edge subnet(s): if this
# server-block is the public TLS terminator, the client's TCP peer already IS
# the real IP and you may omit set_real_ip_from; keep it only if another proxy
# (e.g. Cloudflare / a load balancer) sits in front -- then list THAT proxy's
# ranges here. Do NOT trust a wide/public range. (Place in http{} or here.)
# set_real_ip_from 10.0.0.0/8;        # <-- your trusted upstream proxy subnet
# real_ip_header   X-Forwarded-For;
# real_ip_recursive on;

# -- Rate-limit zones (place in the http{} context; shown here for reference) --
# NOTE: X-HWID / $http_x_hwid carries the client's RANDOM per-install id (the
# header name is kept to avoid churn); it is NOT a device id. Map an EMPTY
# X-HWID header to the binary remote addr so a client that simply omits the
# header still gets rate-limited (nginx skips limit_req on an empty key). The
# app-level per-install limiter (keyed off the validated body field) remains
# authoritative; this just keeps the nginx layer from being a free bypass.
# (A 'map' must live in the http{} context.)
map $http_x_hwid $hwid_limit_key {
    ""      $binary_remote_addr;
    default $http_x_hwid;
}
# limit_req_zone $binary_remote_addr           zone=ranking_ip:10m  rate=10r/m;
# limit_req_zone $hwid_limit_key                zone=ranking_hwid:10m rate=10r/m;
# (If you keep zones in nginx.conf's http{}, delete the two lines below.)
limit_req_zone $binary_remote_addr            zone=ranking_ip:10m   rate=10r/m;
limit_req_zone $hwid_limit_key                 zone=ranking_hwid:10m  rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name ranking.example.tld;
    # Let certbot serve the ACME challenge, then redirect everything to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ranking.example.tld;

    # TLS -- certbot fills these in (placeholders).
    ssl_certificate     /etc/letsencrypt/live/ranking.example.tld/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ranking.example.tld/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Small body cap -- the submit payload is < 1 KB.
    client_max_body_size 4k;

    # Security headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # fail2ban-friendly access log (a dedicated file makes a jail trivial).
    access_log /var/log/nginx/ranking_access.log;
    error_log  /var/log/nginx/ranking_error.log;

    # Pass the real client IP to the app (used for the hashed-IP store).
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;
    proxy_http_version 1.1;

    # POST /submit -- strict per-IP AND per-HWID limits (burst kept tiny).
    location = /submit {
        limit_req zone=ranking_ip   burst=5  nodelay;
        limit_req zone=ranking_hwid burst=5  nodelay;
        limit_req_status 429;
        # Forward the HWID header so the app + the per-HWID zone both see it.
        proxy_set_header X-HWID $http_x_hwid;
        proxy_pass http://127.0.0.1:8081;
    }

    # GET /leaderboard -- per-IP limit only (no HWID on reads).
    location = /leaderboard {
        limit_req zone=ranking_ip burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8081;
    }

    # Admin path stays behind the env-token; still rate-limit + you may also
    # restrict by source IP here (allow/deny) if you administer from a fixed IP.
    location /admin/ {
        limit_req zone=ranking_ip burst=5 nodelay;
        # allow 203.0.113.0/24;  deny all;   # optional: lock to your admin IP
        proxy_pass http://127.0.0.1:8081;
    }

    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8081;
    }

    # Everything else -> 404 (no docs in prod).
    location / { return 404; }
}
